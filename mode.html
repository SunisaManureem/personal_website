<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Select Mode</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<noscript>
    <div style="background: #ffefc1; color: #333; padding: 1em; text-align: center;">
        โหมดเลือกภาพเกมนี้ต้องใช้ JavaScript หากปิด JS จะไม่สามารถเลือกโหมดเกมได้<br>
        <a href="index.html" style="color:#007bff;">กลับหน้าแรก</a>
    </div>
</noscript>
<div class="mode-container">
    <h1>🎮 Puzzle Game</h1>
    <p>Select your game mode</p>

    <button onclick="selectMode('default')" class="btn btn-primary">
        Default Image
    </button>

    <button onclick="selectMode('upload')" class="btn btn-outline">
        Upload Image
    </button>
</div>

<script>
function selectMode(mode){
    localStorage.setItem("gameMode", mode);
    window.location.href = "game-puzzle.html";
}
</script>

</body>
</html>
