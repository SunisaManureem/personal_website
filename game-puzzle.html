<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Puzzle Game</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="game-container">
    <h1>🧩 F1 Puzzle Game</h1>
</div>

<div class="game-top">
    <div class="game-info">
        ⏱ <span id="timer">0</span>s
        | 🔢 <span id="moves">0</span>
    </div>

    <div class="game-controls">
        <select id="difficulty">
            <option value="3">3x3</option>
            <option value="4">4x4</option>
            <option value="5">5x5</option>
        </select>
        <div style="margin-bottom:10px;">
    <button id="defaultMode" class="btn btn-outline">Default Image</button>
    <button id="uploadMode" class="btn btn-outline">Upload Image</button>
</div>

<input type="file" id="uploadImage" accept="image/*" style="display:none;">

        <button onclick="startGame()">Start</button>
        <button onclick="shuffle()">Shuffle</button>
    </div>
</div>

<!-- Preview Section -->
<div class="preview-wrapper">
    <img src="images/f1.jpg" id="previewImage">
    <button id="previewBtn" class="preview-btn">👁 Hold</button>
</div>

    <div id="puzzleBoard"></div>

    <p id="status"></p>
</div>

<script src="js/puzzle.js"></script>
</body>
</html>
