<head>

    <meta name="description" content="Test your web development knowledge with this interactive quiz">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Sunisa</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="index.html#skills" class="nav-link">Skills</a></li>
                <li><a href="index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
                <li><a href="cv.html" class="nav-link">CV</a></li>
                <li><a href="quiz.html" class="nav-link active">Quiz</a></li>
                 <li><a href="game-puzzle.html" class="nav-link">Games</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Quiz Section -->
    <main class="quiz-page">
        <div class="container">
            <div class="quiz-container">
                <h1 class="quiz-title">Web Development Quiz</h1>
                <p class="quiz-subtitle">Test your knowledge of HTML, CSS, and JavaScript</p>

                <!-- Progress Bar -->
                <div class="quiz-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-text" id="progressText">Question 1 of 8</span>
                </div>

                <!-- Quiz Content -->
                <div class="quiz-content" id="quizContent">
                    <div class="question-container" id="questionContainer">
                        <!-- Questions will be loaded here -->
                    </div>
                </div>

                <!-- Quiz Controls -->
                <div class="quiz-controls" id="quizControls">
                    <button class="btn btn-outline" id="prevBtn" disabled>Previous</button>
                    <button class="btn btn-primary" id="nextBtn">Next</button>
                </div>

                <!-- Results Section (hidden initially) -->
                <div class="quiz-results hidden" id="quizResults">
                    <div class="results-icon" id="resultsIcon"></div>
                    <h2 class="results-title" id="resultsTitle"></h2>
                    <p class="results-score" id="resultsScore"></p>
                    <div class="results-breakdown" id="resultsBreakdown"></div>
                    <button class="btn btn-primary" id="restartBtn">Try Again</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Sunisa Manureem. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/quiz.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
